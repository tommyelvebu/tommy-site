version: "3.9"

services:
  nginx:
    build:
      context: ./nginx
    ports:
    - "80:80" # cloudflared will reach this
    depends_on: 
    - backend
    volumes:
    - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped
  
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend/app
      - db_data:/app/db
    restart: unless-stopped

  deploy_webhook:
    build:
      context: ./deploy_webhook

    volumes:
      - .:/repo
    restart: unless-stopped
  
volumes:
  db_data:

