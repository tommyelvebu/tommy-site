<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guest Book - Tommy Elvebu</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/kristopolous/BOOTSTRA.386@master/v3.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/kristopolous/BOOTSTRA.386@master/v3.3.2/dist/css/bootstrap-theme.min.css">
  <link rel="stylesheet" href="/css/site.css">
  <link rel="stylesheet" href="/css/guestbook.css">
</head>
<body>

  <nav id="navbar" class="navbar navbar-default navbar-fixed-top"></nav>
  <script src="/js/components.js?v=2"></script>

  <div class="container content-container">
    <div class="page-header">
      <h1>Guest Book</h1>
    </div>
    <p>Leave your name and a message which will live on forever on this website.</p>

    <div class="row">
      <div class="col-md-6 col-md-offset-3">
        <div class="gb-form-panel">
          <div class="gb-panel-title">-= Sign the guest book =-</div>
          <div class="gb-panel-body">
            <form id="guestbook-form" novalidate>
              <div class="form-group">
                <label for="gb-name">Name</label>
                <input type="text" class="form-control" id="gb-name" placeholder="Your name" maxlength="100">
                <span class="field-error" id="err-name"></span>
              </div>
              <div class="form-group">
                <label for="gb-email">Email</label>
                <input type="email" class="form-control" id="gb-email" placeholder="your@email.com">
                <span class="field-error" id="err-email"></span>
              </div>
              <div class="form-group">
                <label for="gb-message">Message <span id="word-count">(0 / 100 words)</span></label>
                <textarea class="form-control" id="gb-message" rows="4" placeholder="What's on your mind?"></textarea>
                <span class="field-error" id="err-message"></span>
              </div>
              <button type="submit" class="btn btn-primary">Submit</button>
              <div id="submit-result"></div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <hr>

    <div class="row">
      <div class="col-md-6 col-md-offset-3">
        <h2>Entries</h2>
        <div id="entries-list">
          <p>Loading...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    function wordCount(text) {
      return text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
    }

    document.getElementById("gb-message").addEventListener("input", function() {
      var count = wordCount(this.value);
      var el = document.getElementById("word-count");
      el.textContent = "(" + count + " / 100 words)";
      el.className = count > 100 ? "over-limit" : "";
    });

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function loadEntries() {
      fetch("/api/guestbook")
        .then(function(res) { return res.json(); })
        .then(function(data) {
          var container = document.getElementById("entries-list");
          if (!data.length) {
            container.innerHTML = "<p>No entries yet. Be the first!</p>";
            return;
          }
          var html = "";
          data.forEach(function(entry) {
            html +=
              '<div class="entry-card">' +
                '<div class="entry-card-header">' +
                  '<span class="entry-card-name">' + escapeHtml(entry.name) + '</span>' +
                  '<span class="entry-card-date">' + entry.created_at + '</span>' +
                '</div>' +
                '<div class="entry-card-body">' + escapeHtml(entry.message) + '</div>' +
              '</div>';
          });
          container.innerHTML = html;
        })
        .catch(function() {
          document.getElementById("entries-list").innerHTML =
            '<p class="text-danger"><span class="glyphicon glyphicon-exclamation-sign"></span> Failed to load entries.</p>';
        });
    }

    function setError(id, msg) {
      var el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = msg ? "block" : "none";
      var input = el.previousElementSibling;
      if (msg) input.classList.add("field-invalid");
      else input.classList.remove("field-invalid");
    }

    document.getElementById("guestbook-form").addEventListener("submit", function(e) {
      e.preventDefault();
      var name = document.getElementById("gb-name").value.trim();
      var email = document.getElementById("gb-email").value.trim();
      var message = document.getElementById("gb-message").value.trim();
      var resultEl = document.getElementById("submit-result");

      var valid = true;
      setError("err-name", name ? "" : "Name is required.");
      if (!name) valid = false;

      if (!email) {
        setError("err-email", "Email is required.");
        valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setError("err-email", "Enter a valid email address.");
        valid = false;
      } else {
        setError("err-email", "");
      }

      if (!message) {
        setError("err-message", "Message is required.");
        valid = false;
      } else if (wordCount(message) > 100) {
        setError("err-message", "Message exceeds 100 words.");
        valid = false;
      } else {
        setError("err-message", "");
      }

      if (!valid) return;
      resultEl.innerHTML = "<p>Submitting...</p>";

      fetch("/api/guestbook", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: name, email: email, message: message })
      })
        .then(function(res) {
          if (!res.ok) return res.json().then(function(d) { throw new Error(d.detail || "Error"); });
          return res.json();
        })
        .then(function() {
          resultEl.innerHTML = "<p class='text-success'>Entry added! Thanks :)</p>";
          document.getElementById("guestbook-form").reset();
          document.getElementById("word-count").textContent = "(0 / 100 words)";
          loadEntries();
        })
        .catch(function(err) {
          resultEl.innerHTML = '<p class="text-danger">' + escapeHtml(err.message) + '</p>';
        });
    });

    loadEntries();
  </script>
</body>
</html>
